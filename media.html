<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flexbox</title>
    <style>
      /*   * {
        margin: 0%;
        padding: 0%;
        box-sizing: border-box; */

      body {
        margin: 0;
        padding: 20px;
        font-family: Arial, Helvetica, sans-serif;
      }

      .con {
        display: flex;
        background-color: gold;

        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 20px;
        border-radius: 40px;
        border-style: dashed;
        color: black;
        flex-wrap: nowrap;
      }
      .box {
        background-color: #7c7c7c;
        color: whitesmoke;
        padding: 30px;
        text-align: center;
        flex: 1;
        border-radius: 20px;
        border-style: groove;
        color: black;
      }
      .box img {
        width: 100%;
        padding: 2pxx;
        border-radius: 20px;
      }
      .box h3 {
        margin: 10px 0;
      }
      .box p {
        font-size: 14px;
      }
      .box button {
        padding: 8px;
        border: none;
        background-color: blue;
        color: white;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>

    <h1>Welcome To Home For Builders.</h1>
  </header>
