<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta charset="UTF-8">
</head>
<body>
  <h1>Submitted Leads</h1>

<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Phone</th>
      <th>Device</th>
      <th>Browser</th>
      <th>OS</th>
      <th>Country</th>
      <th>City</th>
    </tr>
  </thead>
  <tbody id="leadsTable"></tbody>
</table>
<script>
async function loadLeads() {
  const response = await fetch("/leads");
  const leads = await response.json();

  const table = document.getElementById("leadsTable");

  leads.forEach(lead => {
    table.innerHTML += `
      <tr>
        <td>${lead.id}</td>
        <td>${lead.name}</td>
        <td>${lead.email}</td>
        <td>${lead.phone}</td>
        <td>${lead.device_type}</td>
        <td>${lead.browser}</td>
        <td>${lead.os}</td>
        <td>${lead.country}</td>
        <td>${lead.city}</td>
      </tr>
    `;
  });
}

loadLeads();
</script>

  <button onclick="downloadCSV()">Download Leads CSV</button>
  <script>
async function downloadCSV() {
  const response = await fetch("/leads");
  const leads = await response.json();

  let csv =
    "ID,Name,Email,Phone,Device,Browser,OS,Country,City,Created At\n";

  leads.forEach(lead => {
    csv += `"${lead.id}","${lead.name}","${lead.email}","${lead.phone}","${lead.device_type}","${lead.browser}","${lead.os}","${lead.country}","${lead.city}","${lead.created_at}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "leads.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
}
  </script>
</body>
</html>
